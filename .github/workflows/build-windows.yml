name: Build Windows EXE

on:
  push:
    branches: [main, master]
    paths:
      - "launcher_app.py"
      - "dy_auto_reply_win.spec"
      - "requirements-build.txt"
      - "scripts/**"
      - "platforms/**"
      - "shared/**"
      - "config/dy_reply.example.yaml"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch:   # 允许在 Actions 页面手动触发

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install build dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Download bundled Chromium
        shell: cmd
        run: |
          set PLAYWRIGHT_BROWSERS_PATH=%CD%\.playwright-browsers
          python -m playwright install chromium

      - name: Build with PyInstaller
        shell: cmd
        run: |
          pyinstaller dy_auto_reply_win.spec --clean --noconfirm

      - name: List build output
        shell: pwsh
        run: |
          Get-ChildItem dist\dy_auto_reply
          $chrome = Get-ChildItem dist\dy_auto_reply\_internal\playwright-browsers -Recurse -Filter chrome.exe
          if (-not $chrome) {
            throw "Bundled Chromium chrome.exe not found"
          }
          Write-Host "Bundled Chromium: $($chrome.FullName)"

      - name: Copy docs into dist
        shell: pwsh
        run: |
          Get-ChildItem -Path "使用说明.txt", "教程-Windows.md", "README.md" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "dist\dy_auto_reply\" -Force
          }
          Write-Host "--- dist contents ---"
          Get-ChildItem dist\dy_auto_reply | Select-Object Name, Length

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\dy_auto_reply\* -DestinationPath dist\dy_auto_reply_windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dy_auto_reply-windows
          path: dist/dy_auto_reply_windows.zip
          retention-days: 14
